<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .add-habit-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .add-habit-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .add-habit-form input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .add-habit-form input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .add-habit-form button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .add-habit-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.3);
        }

        .habits-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .habit-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .habit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .habit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .habit-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }

        .habit-actions {
            display: flex;
            gap: 10px;
        }

        .streak-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ff3838;
        }

        .week-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day-box {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-height: 60px;
        }

        .day-box.completed {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }

        .day-box:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .day-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .day-date {
            font-size: 10px;
            opacity: 0.7;
        }

        .checkmark {
            display: none;
            font-size: 24px;
            position: absolute;
        }

        .day-box.completed .checkmark {
            display: block;
        }

        .stats-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f7f7f7 0%, #e8e8e8 100%);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .week-view {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .day-box {
                min-height: 50px;
            }

            .day-label {
                font-size: 10px;
            }

            .habit-name {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Habit Tracker</h1>
            <p>Build better habits, one day at a time</p>
        </div>

        <div class="add-habit-section">
            <div class="add-habit-form">
                <input type="text" id="habitInput" placeholder="Enter a new habit (e.g., Exercise, Read, Meditate)">
                <button onclick="addHabit()">Add Habit</button>
            </div>
        </div>

        <div id="habitsGrid" class="habits-grid"></div>

        <div class="stats-section">
            <h2 style="margin-bottom: 10px; color: #333;">📊 Your Progress</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalHabits">0</div>
                    <div class="stat-label">Total Habits</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="completedToday">0</div>
                    <div class="stat-label">Completed Today</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="weeklyAverage">0%</div>
                    <div class="stat-label">Weekly Completion Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="longestStreak">0</div>
                    <div class="stat-label">Longest Streak</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize habits from localStorage or empty array
        let habits = JSON.parse(localStorage.getItem('habits')) || [];

        // Get current date info
        function getWeekDates() {
            const today = new Date();
            const weekDates = [];
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() - today.getDay() + i);
                weekDates.push({
                    dayName: dayNames[i],
                    date: date.getDate(),
                    fullDate: date.toISOString().split('T')[0],
                    isToday: date.toDateString() === today.toDateString()
                });
            }
            return weekDates;
        }

        // Add new habit
        function addHabit() {
            const input = document.getElementById('habitInput');
            const habitName = input.value.trim();
            
            if (habitName === '') {
                alert('Please enter a habit name');
                return;
            }

            const newHabit = {
                id: Date.now(),
                name: habitName,
                completedDates: [],
                createdAt: new Date().toISOString()
            };

            habits.push(newHabit);
            saveHabits();
            input.value = '';
            renderHabits();
            updateStats();
        }

        // Delete habit
        function deleteHabit(id) {
            if (confirm('Are you sure you want to delete this habit?')) {
                habits = habits.filter(habit => habit.id !== id);
                saveHabits();
                renderHabits();
                updateStats();
            }
        }

        // Toggle habit completion
        function toggleHabit(habitId, date) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;

            const dateIndex = habit.completedDates.indexOf(date);
            if (dateIndex > -1) {
                habit.completedDates.splice(dateIndex, 1);
            } else {
                habit.completedDates.push(date);
            }

            saveHabits();
            renderHabits();
            updateStats();
        }

        // Calculate streak
        function calculateStreak(completedDates) {
            if (completedDates.length === 0) return 0;

            const sortedDates = completedDates
                .map(d => new Date(d))
                .sort((a, b) => b - a);

            let streak = 0;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let currentDate = new Date(today);
            
            for (let i = 0; i < sortedDates.length; i++) {
                const checkDate = new Date(sortedDates[i]);
                checkDate.setHours(0, 0, 0, 0);
                
                if (checkDate.getTime() === currentDate.getTime()) {
                    streak++;
                    currentDate.setDate(currentDate.getDate() - 1);
                } else if (checkDate.getTime() < currentDate.getTime()) {
                    break;
                }
            }

            return streak;
        }

        // Render habits
        function renderHabits() {
            const grid = document.getElementById('habitsGrid');
            
            if (habits.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <h3>No habits yet!</h3>
                        <p>Start by adding your first habit above</p>
                    </div>
                `;
                return;
            }

            const weekDates = getWeekDates();
            
            grid.innerHTML = habits.map(habit => {
                const streak = calculateStreak(habit.completedDates);
                
                return `
                    <div class="habit-card">
                        <div class="habit-header">
                            <div class="habit-name">${habit.name}</div>
                            <div class="habit-actions">
                                ${streak > 0 ? `<span class="streak-badge">🔥 ${streak} days</span>` : ''}
                                <button class="delete-btn" onclick="deleteHabit(${habit.id})">Delete</button>
                            </div>
                        </div>
                        <div class="week-view">
                            ${weekDates.map(day => {
                                const isCompleted = habit.completedDates.includes(day.fullDate);
                                return `
                                    <div class="day-box ${isCompleted ? 'completed' : ''} ${day.isToday ? 'today' : ''}" 
                                         onclick="toggleHabit(${habit.id}, '${day.fullDate}')">
                                        <div class="day-label">${day.dayName}</div>
                                        <div class="day-date">${day.date}</div>
                                        <span class="checkmark">✓</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update statistics
        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const weekDates = getWeekDates();
            
            // Total habits
            document.getElementById('totalHabits').textContent = habits.length;
            
            // Completed today
            const completedToday = habits.filter(habit => 
                habit.completedDates.includes(today)
            ).length;
            document.getElementById('completedToday').textContent = completedToday;
            
            // Weekly completion rate
            let totalPossible = habits.length * 7;
            let totalCompleted = 0;
            
            habits.forEach(habit => {
                weekDates.forEach(day => {
                    if (habit.completedDates.includes(day.fullDate)) {
                        totalCompleted++;
                    }
                });
            });
            
            const weeklyRate = totalPossible > 0 ? Math.round((totalCompleted / totalPossible) * 100) : 0;
            document.getElementById('weeklyAverage').textContent = weeklyRate + '%';
            
            // Longest streak
            const allStreaks = habits.map(habit => calculateStreak(habit.completedDates));
            const longestStreak = Math.max(0, ...allStreaks);
            document.getElementById('longestStreak').textContent = longestStreak;
        }

        // Save to localStorage
        function saveHabits() {
            localStorage.setItem('habits', JSON.stringify(habits));
        }

        // Allow Enter key to add habit
        document.getElementById('habitInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addHabit();
            }
        });

        // Initial render
        renderHabits();
        updateStats();
    </script>
</body>
</html>
